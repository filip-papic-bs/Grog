name: weekly snapshot

on:
  schedule:
    - cron: "00 8 * * 1,4"
  push:
    branches: [master]
    paths-ignore:
      - "data/snapshots/**"
      - "data/classifications.json"
  workflow_dispatch: {}

concurrency:
  group: grog-weekly
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps (skip Playwright browser — all casinos are API/curl)
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Log runner egress IP / region
        run: curl -s https://ipinfo.io/json || echo "(ipinfo unreachable)"

      - name: Scrape all casinos + rebuild dashboard
        if: github.event_name != 'push'
        run: npm run grog -- run all --no-open
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Rebuild dashboard from committed snapshots (push deploy — no scrape)
        if: github.event_name == 'push'
        run: npm run grog -- dashboard --no-open

      - name: Commit new snapshot to history
        run: |
          git config user.name  "grog-bot"
          git config user.email "grog-bot@users.noreply.github.com"
          git add data/snapshots data/classifications.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "data: weekly snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Stage dashboard as the Pages site
        run: |
          mkdir -p site
          cp data/dashboard.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
